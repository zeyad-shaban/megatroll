<!doctype html>  
<html>  
    <head>  
        <meta charset="utf-8" />  
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />  
        <title>ROS2 Joystick – /cmd_vel</title>  
        <link rel="stylesheet" href="style.css" />  
        <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>  
    </head>  
    <body>  
        <div class="container">  
            <div class="joystick-panel">  
                <div class="title">🕹️ VIRTUAL JOYSTICK</div>  
                <canvas id="joystickCanvas" width="250" height="250"></canvas>  
                <div class="controls">  
                    <div class="scale-box">  
                        <span>🐢</span>  
                        <input  
                            type="range"  
                            id="speedScale"  
                            min="0"  
                            max="1.0"  
                            step="0.01"  
                            value="0.6"  
                        />  
                        <span>🐇</span>  
                    </div>  
                </div>  
                <div class="status" id="statusMsg">Connecting to ROS2...</div>  
                <div class="debug-output" id="debugOutput">  
                    <div>linear.x: <span id="linearVal">0.000</span></div>  
                    <div>angular.z: <span id="angularVal">0.000</span></div>  
                    <div>target.err_x: <span id="targetErrX">NA</span></div>  
                    <div>target.depth: <span id="targetDepth">NA</span></div>  
                </div>  
            </div>  
  
            <!-- Gripper Control Panel -->  
            <div class="gripper-panel">  
                <div class="title">🦾 GRIPPER CONTROL</div>  
                <div class="gripper-buttons">  
                    <button id="btnOpen" class="grip-btn grip-open">OPEN GRIPPER</button>  
                    <button id="btnClose" class="grip-btn grip-close">CLOSE GRIPPER</button>  
                </div>  
                <div class="gripper-status" id="gripperStatus">UNKNOWN</div>  
            </div>  
        </div>
    <div class="camera-panel">
        <div class="title">📹 CAMERA FEED</div>
        <img id="cameraImage" src="" alt="Camera stream" style="width:100%; border-radius:12px; background:#111;" />
        <div class="status" id="cameraStatus">Connecting to camera...</div>
    </div>
    </div>  
        <script src="index.js"></script>  
    </body>  
</html>
